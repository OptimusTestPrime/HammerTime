<!DOCTYPE html>

<html lang="en" style="background:#080e1a !important; color-scheme: dark;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HammerTime</title>
<style>
  :root {
    --bg: #080e1a;
    --surface: #0d1726;
    --surface2: #111f35;
    --border: #1e3a5f;
    --accent: #00c8ff;
    --accent2: #00ff9d;
    --red: #ff3b5c;
    --text: #e8f4ff;
    --muted: #4a7090;
    --gold: #ffd060;
  }

html, body { background: #080e1a !important; }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(–bg) !important;
color: var(–text);
font-family: -apple-system, ‘SF Pro Display’, ‘Helvetica Neue’, sans-serif;
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
padding: 16px;
background-image:
radial-gradient(ellipse at 20% 0%, rgba(0,200,255,0.06) 0%, transparent 60%),
radial-gradient(ellipse at 80% 100%, rgba(0,255,157,0.04) 0%, transparent 60%);
}

header {
width: 100%;
max-width: 480px;
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 18px;
padding-bottom: 12px;
border-bottom: 1px solid var(–border);
}

.app-title {
font-size: 1.25rem;
font-weight: 700;
letter-spacing: 0.05em;
color: var(–accent);
display: flex;
align-items: center;
gap: 8px;
}

.title-hammer { font-size: 1.3rem; }

.title-main {
font-size: 1.3rem;
font-weight: 800;
letter-spacing: 0.02em;
text-transform: uppercase;
color: #e8f4ff;
}

.title-time {
color: var(–accent);
font-style: italic;
}

.view-toggle {
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 8px;
display: flex;
overflow: hidden;
}

.view-toggle button {
background: none;
border: none;
color: var(–muted);
padding: 7px 13px;
cursor: pointer;
font-size: 1rem;
transition: all 0.2s;
display: flex;
align-items: center;
}

.view-toggle button.active {
background: var(–accent);
color: var(–bg);
}

/* Timing option selector */
.timing-selector {
width: 100%;
max-width: 480px;
display: grid;
grid-template-columns: 1fr 1fr;
gap: 8px;
margin-bottom: 20px;
}

.timing-btn {
background: #0a111e;
border: 2px solid #1e3a5f;
border-radius: 10px;
color: #4a7090;
padding: 12px 8px;
cursor: pointer;
font-family: -apple-system, ‘SF Pro Display’, ‘Helvetica Neue’, sans-serif;
font-size: 0.85rem;
font-weight: 700;
letter-spacing: 0.05em;
text-transform: uppercase;
text-align: center;
transition: all 0.2s;
line-height: 1.3;
}

.timing-btn.active {
background: #00c8ff;
border: 2px solid #00c8ff;
color: #080e1a;
}

/* Main display area */
.display-area {
width: 100%;
max-width: 480px;
margin-bottom: 24px;
}

/* Digital view */
#digital-view {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 16px;
padding: 28px 16px;
text-align: center;
position: relative;
overflow: hidden;
}

#digital-view::before {
content: ‘’;
position: absolute;
top: 0; left: 0; right: 0;
height: 1px;
background: linear-gradient(90deg, transparent, var(–accent), transparent);
opacity: 0.5;
}

.time-display {
font-family: ‘SF Mono’, ui-monospace, ‘Courier New’, monospace;
font-size: clamp(2.8rem, 11vw, 5rem); white-space: nowrap; overflow: hidden; width: 100%; text-align: center;
color: var(–text);
letter-spacing: 0.02em;
line-height: 1;
text-shadow: 0 0 30px rgba(0,200,255,0.3);
transition: color 0.1s;
}

.time-display.running {
color: var(–accent2);
text-shadow: 0 0 30px rgba(0,255,157,0.4);
}

.time-label {
font-size: 0.75rem;
letter-spacing: 0.15em;
color: var(–muted);
text-transform: uppercase;
margin-top: 8px;
}

/* Analog view */
#analog-view {
display: none;
flex-direction: column;
align-items: center;
background: var(–surface);
border: 1px solid var(–border);
border-radius: 16px;
padding: 24px 16px;
position: relative;
}

#analog-view::before {
content: ‘’;
position: absolute;
top: 0; left: 0; right: 0;
height: 1px;
background: linear-gradient(90deg, transparent, var(–accent), transparent);
opacity: 0.5;
}

.watch-container {
position: relative;
width: min(280px, 70vw);
height: min(280px, 70vw);
margin: 0 auto;
}

#watch-canvas {
width: 100%;
height: 100%;
border-radius: 50%;
}

.analog-digital {
font-family: ‘SF Mono’, ui-monospace, ‘Courier New’, monospace;
font-size: 1.5rem;
color: var(–muted);
text-align: center;
margin-top: 14px;
letter-spacing: 0.08em;
}

/* Controls */
.controls {
width: 100%;
max-width: 480px;
display: flex;
align-items: center;
justify-content: center;
gap: 20px;
margin-bottom: 28px;
}

.btn-start {
width: 130px;
height: 130px;
border-radius: 50%;
background: linear-gradient(135deg, #00c8ff22, #00c8ff11);
border: 3px solid var(–accent);
color: var(–accent);
font-family: -apple-system, ‘SF Pro Display’, ‘Helvetica Neue’, sans-serif;
font-size: 1.5rem;
font-weight: 700;
letter-spacing: 0.1em;
text-transform: uppercase;
cursor: pointer;
transition: all 0.15s;
box-shadow: 0 0 20px rgba(0,200,255,0.2), inset 0 0 20px rgba(0,200,255,0.05);
display: flex;
align-items: center;
justify-content: center;
flex-direction: column;
gap: 2px;
position: relative;
overflow: hidden;
}

.btn-start::after {
content: ‘’;
position: absolute;
inset: 4px;
border-radius: 50%;
border: 1px solid rgba(0,200,255,0.15);
}

.btn-start:active { transform: scale(0.96); }

.btn-start.running {
border-color: var(–red);
color: var(–red);
background: linear-gradient(135deg, #ff3b5c22, #ff3b5c11);
box-shadow: 0 0 20px rgba(255,59,92,0.25), inset 0 0 20px rgba(255,59,92,0.05);
}

.btn-start.running::after { border-color: rgba(255,59,92,0.15); }

.btn-start-icon {
font-size: 2rem;
line-height: 1;
}

.side-buttons {
display: flex;
flex-direction: column;
gap: 12px;
}

.btn-reset {
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 50%;
width: 56px;
height: 56px;
color: var(–muted);
font-family: -apple-system, ‘SF Pro Display’, ‘Helvetica Neue’, sans-serif;
font-size: 0.7rem;
font-weight: 700;
letter-spacing: 0.08em;
text-transform: uppercase;
cursor: pointer;
transition: all 0.15s;
display: flex;
align-items: center;
justify-content: center;
flex-direction: column;
}

.btn-reset:hover { border-color: var(–muted); color: var(–text); }
.btn-reset:active { transform: scale(0.94); }

/* History */
.history-section {
width: 100%;
max-width: 480px;
}

.history-block {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 12px;
margin-bottom: 12px;
overflow: hidden;
}

.history-header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 12px 16px;
border-bottom: 1px solid var(–border);
background: var(–surface2);
}

.history-title {
font-size: 0.8rem;
font-weight: 700;
letter-spacing: 0.12em;
text-transform: uppercase;
color: var(–muted);
}

.history-title .hl { color: var(–accent); }

.btn-clear {
background: none;
border: 1px solid var(–border);
border-radius: 5px;
color: var(–muted);
font-family: -apple-system, ‘SF Pro Display’, ‘Helvetica Neue’, sans-serif;
font-size: 0.7rem;
font-weight: 700;
letter-spacing: 0.1em;
text-transform: uppercase;
padding: 4px 10px;
cursor: pointer;
transition: all 0.15s;
}

.btn-clear:hover { border-color: var(–red); color: var(–red); }

.history-list {
padding: 8px 0;
}

@keyframes fadeIn {
from { opacity: 0; transform: translateY(-6px); }
to { opacity: 1; transform: translateY(0); }
}

.history-item:hover { background: rgba(0,200,255,0.04); }

.history-bar {
display: none;
}

.history-location {
background: #0a111e;
border: 1px solid #1e3a5f;
border-radius: 6px;
color: #4a7090;
font-family: -apple-system, ‘SF Pro Display’, ‘Helvetica Neue’, sans-serif;
font-size: 0.72rem;
font-weight: 600;
letter-spacing: 0.04em;
padding: 4px 6px;
cursor: pointer;
flex-shrink: 0;
max-width: 140px;
-webkit-appearance: none;
appearance: none;
text-align: center;
}

.history-location.set {
border-color: #00c8ff;
color: #00c8ff;
background: rgba(0,200,255,0.08);
}

.history-item {
display: flex;
align-items: center;
padding: 8px 16px;
gap: 10px;
transition: background 0.15s;
animation: fadeIn 0.3s ease;
flex-wrap: nowrap;
}

.history-num {
font-size: 0.7rem;
color: var(–muted);
width: 18px;
text-align: right;
flex-shrink: 0;
}

.history-time {
font-family: ‘SF Mono’, ui-monospace, ‘Courier New’, monospace;
font-size: 1.05rem;
color: var(–text);
flex-shrink: 0;
}

.history-item:first-child .history-time { color: var(–gold); }

.history-spacer { flex: 1; }

.history-empty {
padding: 16px;
text-align: center;
color: var(–muted);
font-size: 0.85rem;
letter-spacing: 0.05em;
}

.pulse-ring {
position: absolute;
inset: -6px;
border-radius: 50%;
border: 2px solid var(–accent);
opacity: 0;
animation: none;
}

.btn-start.running .pulse-ring {
animation: pulse 1.5s ease-out infinite;
}

@keyframes pulse {
0% { opacity: 0.6; transform: scale(1); }
100% { opacity: 0; transform: scale(1.15); }
}

/* hide/show views */
#digital-view.hidden { display: none; }
#analog-view.visible { display: flex; }

.bmc-btn {
position: fixed;
bottom: 20px;
right: 20px;
background: #00c8ff;
color: #080e1a;
font-family: -apple-system, ‘SF Pro Display’, ‘Helvetica Neue’, sans-serif;
font-size: 0.78rem;
font-weight: 800;
letter-spacing: 0.06em;
text-transform: uppercase;
text-decoration: none;
padding: 10px 16px;
border-radius: 50px;
display: flex;
align-items: center;
gap: 7px;
box-shadow: 0 4px 20px rgba(0,200,255,0.35);
transition: transform 0.15s, box-shadow 0.15s;
z-index: 999;
}

.bmc-btn:active {
transform: scale(0.95);
box-shadow: 0 2px 10px rgba(0,200,255,0.25);
}

.bmc-btn-icon {
font-size: 1rem;
}
</style>

</head>
<body>

<header>
  <div class="app-title">
    <span class="title-hammer">🥌</span>
    <span class="title-main">Hammer<span class="title-time">Time</span></span>
  </div>
  <div class="view-toggle">
    <button id="btn-digital" class="active" onclick="setView('digital')" title="Digital">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <rect x="3" y="7" width="18" height="10" rx="2"/>
        <line x1="7" y1="11" x2="7" y2="13"/><line x1="10" y1="10" x2="10" y2="14"/>
        <line x1="13" y1="11" x2="13" y2="13"/><line x1="16" y1="10" x2="16" y2="14"/>
      </svg>
    </button>
    <button id="btn-analog" onclick="setView('analog')" title="Analog">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="9"/>
        <line x1="12" y1="7" x2="12" y2="12"/>
        <line x1="12" y1="12" x2="15" y2="14"/>
      </svg>
    </button>
  </div>
</header>

<!-- Timing Option -->

<div class="timing-selector">
  <button class="timing-btn active" id="opt-0" onclick="selectOption(0)">Back Line<br>to Hog Line</button>
  <button class="timing-btn" id="opt-1" onclick="selectOption(1)">Hog Line<br>to Hog Line</button>
</div>

<!-- Display -->

<div class="display-area">
  <div id="digital-view">
    <div class="time-display" id="time-display">00:00.00</div>
    <div class="time-label" id="time-label">Back Line to Hog Line</div>
  </div>
  <div id="analog-view">
    <div class="watch-container">
      <canvas id="watch-canvas"></canvas>
    </div>
    <div class="analog-digital" id="analog-digital">00:00.00</div>
    <div class="time-label" id="analog-label" style="margin-top:4px">Back Line to Hog Line</div>
  </div>
</div>

<!-- Controls -->

<div class="controls">
  <div class="side-buttons">
    <button class="btn-reset" onclick="resetTimer()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
    </button>
  </div>

  <button class="btn-start" id="btn-start" onclick="toggleTimer()">
    <div class="pulse-ring"></div>
    <div class="btn-start-icon" id="start-icon">▶</div>
    <div id="start-label">START</div>
  </button>

  <div class="side-buttons" style="opacity:0; pointer-events:none;">
    <button class="btn-reset"></button>
  </div>
</div>

<!-- History -->

<div class="history-section">
  <div class="history-block" id="history-0">
    <div class="history-header">
      <span class="history-title"><span class="hl">B→H</span> &nbsp;Back Line to Hog Line</span>
      <button class="btn-clear" onclick="clearHistory(0)">Clear</button>
    </div>
    <div class="history-list" id="list-0"><div class="history-empty">No times recorded</div></div>
  </div>
  <div class="history-block" id="history-1">
    <div class="history-header">
      <span class="history-title"><span class="hl">H→H</span> &nbsp;Hog Line to Hog Line</span>
      <button class="btn-clear" onclick="clearHistory(1)">Clear</button>
    </div>
    <div class="history-list" id="list-1"><div class="history-empty">No times recorded</div></div>
  </div>
</div>

<script>
  const OPTIONS = ['Back Line to Hog Line', 'Hog Line to Hog Line'];
  let currentOption = 0;
  let running = false;
  let startTime = 0;
  let elapsed = 0;
  let rafId = null;
  let currentView = 'digital';

  // Load history
  let history = [
    JSON.parse(localStorage.getItem('curling_history_0') || '[]'),
    JSON.parse(localStorage.getItem('curling_history_1') || '[]')
  ];

  function pad(n, d) { return String(Math.floor(n)).padStart(d, '0'); }

  function formatTime(ms) {
    const mins = Math.floor(ms / 60000);
    const secs = Math.floor((ms % 60000) / 1000);
    const hundredths = Math.floor((ms % 1000) / 10);
    return `${pad(mins,2)}:${pad(secs,2)}.${pad(hundredths,2)}`;
  }

  function updateDisplay(ms) {
    const t = formatTime(ms);
    document.getElementById('time-display').textContent = t;
    document.getElementById('analog-digital').textContent = t;
  }

  function tick() {
    elapsed = Date.now() - startTime;
    updateDisplay(elapsed);
    drawAnalog(elapsed);
    rafId = requestAnimationFrame(tick);
  }

  function toggleTimer() {
    if (!running) {
      startTime = Date.now() - elapsed;
      running = true;
      rafId = requestAnimationFrame(tick);
      document.getElementById('btn-start').classList.add('running');
      document.getElementById('start-icon').textContent = '⏹';
      document.getElementById('start-label').textContent = 'STOP';
      document.getElementById('time-display').classList.add('running');
    } else {
      cancelAnimationFrame(rafId);
      running = false;
      document.getElementById('btn-start').classList.remove('running');
      document.getElementById('start-icon').textContent = '▶';
      document.getElementById('start-label').textContent = 'START';
      document.getElementById('time-display').classList.remove('running');
      logTime(elapsed);
    }
  }

  function resetTimer() {
    if (running) {
      cancelAnimationFrame(rafId);
      running = false;
      document.getElementById('btn-start').classList.remove('running');
      document.getElementById('start-icon').textContent = '▶';
      document.getElementById('start-label').textContent = 'START';
      document.getElementById('time-display').classList.remove('running');
    }
    elapsed = 0;
    updateDisplay(0);
    drawAnalog(0);
  }

  const LOCATIONS = [
    '— Select Location —',
    'High Guard',
    'Mid Guard',
    'Tight Guard',
    'Top 12',
    'Top 8',
    'Front 4',
    'Button',
    'Back 4',
    'Back 8',
    'Back 12',
    'Hack',
    'Parking Lot'
  ];

  function logTime(ms) {
    if (ms < 100) return; // ignore accidental taps
    const entry = { time: formatTime(ms), location: '' };
    history[currentOption].unshift(entry);
    if (history[currentOption].length > 10) history[currentOption].pop();
    localStorage.setItem('curling_history_' + currentOption, JSON.stringify(history[currentOption]));
    renderHistory(currentOption);
  }

  function updateLocation(optIdx, entryIdx, value) {
    history[optIdx][entryIdx].location = value;
    localStorage.setItem('curling_history_' + optIdx, JSON.stringify(history[optIdx]));
    // Update dropdown class
    const sel = document.querySelector(`#list-${optIdx} .history-item:nth-child(${entryIdx+1}) .history-location`);
    if (sel) sel.className = 'history-location' + (value ? ' set' : '');
  }

  function clearHistory(idx) {
    history[idx] = [];
    localStorage.removeItem('curling_history_' + idx);
    renderHistory(idx);
  }

  function renderHistory(idx) {
    const list = document.getElementById('list-' + idx);
    if (!history[idx].length) {
      list.innerHTML = '<div class="history-empty">No times recorded</div>';
      return;
    }
    list.innerHTML = history[idx].map((entry, i) => {
      // support legacy string entries
      const timeStr = typeof entry === 'string' ? entry : entry.time;
      const loc = typeof entry === 'string' ? '' : (entry.location || '');
      const options = LOCATIONS.map(l =>
        `<option value="${l === LOCATIONS[0] ? '' : l}" ${loc === (l === LOCATIONS[0] ? '' : l) ? 'selected' : ''}>${l}</option>`
      ).join('');
      return `<div class="history-item">
        <span class="history-num">${i+1}</span>
        <span class="history-time">${timeStr}</span>
        <span class="history-spacer"></span>
        <select class="history-location${loc ? ' set' : ''}" onchange="updateLocation(${idx},${i},this.value)">${options}</select>
      </div>`;
    }).join('');
  }

  function timeToMs(entry) {
    const str = typeof entry === 'string' ? entry : entry.time;
    const [minsec, hun] = str.split('.');
    const [min, sec] = minsec.split(':');
    return (+min)*60000 + (+sec)*1000 + (+hun)*10;
  }

  function selectOption(idx) {
    currentOption = idx;
    document.getElementById('opt-0').classList.toggle('active', idx === 0);
    document.getElementById('opt-1').classList.toggle('active', idx === 1);
    document.getElementById('time-label').textContent = OPTIONS[idx];
    document.getElementById('analog-label').textContent = OPTIONS[idx];
  }

  function setView(v) {
    currentView = v;
    document.getElementById('digital-view').classList.toggle('hidden', v !== 'digital');
    document.getElementById('analog-view').classList.toggle('visible', v === 'analog');
    document.getElementById('btn-digital').classList.toggle('active', v === 'digital');
    document.getElementById('btn-analog').classList.toggle('active', v === 'analog');
    if (v === 'analog') { resizeCanvas(); drawAnalog(elapsed); }
  }

  // ---------- Analog Watch ----------
  const canvas = document.getElementById('watch-canvas');
  const ctx = canvas.getContext('2d');
  let canvasSize = 280;

  function resizeCanvas() {
    const container = canvas.parentElement;
    canvasSize = container.offsetWidth;
    canvas.width = canvasSize * devicePixelRatio;
    canvas.height = canvasSize * devicePixelRatio;
    ctx.scale(devicePixelRatio, devicePixelRatio);
  }

  function drawAnalog(ms) {
    if (currentView !== 'analog') return;
    const S = canvasSize;
    const cx = S / 2, cy = S / 2;
    const R = S / 2 - 6;
    ctx.clearRect(0, 0, S, S);

    // Face background
    const grad = ctx.createRadialGradient(cx, cy-R*0.2, 0, cx, cy, R);
    grad.addColorStop(0, '#0d1e35');
    grad.addColorStop(1, '#080e1a');
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI*2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Outer ring
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI*2);
    ctx.strokeStyle = '#1e3a5f';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Accent ring
    ctx.beginPath();
    ctx.arc(cx, cy, R - 5, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(0,200,255,0.12)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Tick marks
    for (let i = 0; i < 60; i++) {
      const a = (i / 60) * Math.PI * 2 - Math.PI/2;
      const major = i % 5 === 0;
      const len = major ? 10 : 5;
      const thick = major ? 2 : 1;
      const rOuter = R - 10;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * rOuter, cy + Math.sin(a) * rOuter);
      ctx.lineTo(cx + Math.cos(a) * (rOuter - len), cy + Math.sin(a) * (rOuter - len));
      ctx.strokeStyle = major ? 'rgba(0,200,255,0.7)' : 'rgba(74,112,144,0.5)';
      ctx.lineWidth = thick;
      ctx.stroke();
    }

    // Second numbers (0, 10, 20, 30, 40, 50)
    ctx.font = `bold ${S*0.055}px -apple-system, 'SF Pro Display', sans-serif`;
    ctx.fillStyle = 'rgba(74,112,144,0.9)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2 - Math.PI/2;
      const r = R - 28;
      ctx.fillText(String(i*10), cx + Math.cos(a)*r, cy + Math.sin(a)*r);
    }

    // Minutes sub-dial (top area)
    const subR = R * 0.22;
    const subX = cx, subY = cy - R * 0.38;
    ctx.beginPath();
    ctx.arc(subX, subY, subR, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(0,200,255,0.2)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Sub-dial ticks
    for (let i = 0; i < 30; i++) {
      const a = (i/30)*Math.PI*2 - Math.PI/2;
      const major = i % 5 === 0;
      ctx.beginPath();
      ctx.moveTo(subX + Math.cos(a)*(subR-1), subY + Math.sin(a)*(subR-1));
      ctx.lineTo(subX + Math.cos(a)*(subR - (major ? 5 : 2.5)), subY + Math.sin(a)*(subR - (major ? 5 : 2.5)));
      ctx.strokeStyle = major ? 'rgba(0,200,255,0.5)' : 'rgba(74,112,144,0.35)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    const totalSecs = ms / 1000;
    const totalMins = ms / 60000;

    // Minutes hand (sub-dial)
    const minAngle = (totalMins % 30 / 30) * Math.PI*2 - Math.PI/2;
    ctx.beginPath();
    ctx.moveTo(subX, subY);
    ctx.lineTo(subX + Math.cos(minAngle)*(subR-6), subY + Math.sin(minAngle)*(subR-6));
    ctx.strokeStyle = '#00c8ff';
    ctx.lineWidth = 1.5;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Progress arc
    const secsAngle = (totalSecs % 60 / 60) * Math.PI * 2;
    if (secsAngle > 0) {
      ctx.beginPath();
      ctx.arc(cx, cy, R - 10, -Math.PI/2, -Math.PI/2 + secsAngle);
      ctx.strokeStyle = running ? 'rgba(0,255,157,0.25)' : 'rgba(0,200,255,0.15)';
      ctx.lineWidth = 8;
      ctx.stroke();
    }

    // Second hand
    const secAngle = (totalSecs % 60 / 60) * Math.PI * 2 - Math.PI/2;
    const secColor = running ? '#00ff9d' : '#00c8ff';

    // Tail
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(secAngle + Math.PI) * R*0.2, cy + Math.sin(secAngle + Math.PI) * R*0.2);
    ctx.strokeStyle = secColor;
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Main hand
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(secAngle) * (R - 18), cy + Math.sin(secAngle) * (R - 18));
    ctx.strokeStyle = secColor;
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Glow tip
    ctx.beginPath();
    ctx.arc(cx + Math.cos(secAngle)*(R-18), cy + Math.sin(secAngle)*(R-18), 3, 0, Math.PI*2);
    ctx.fillStyle = secColor;
    ctx.fill();

    // Center cap
    ctx.beginPath();
    ctx.arc(cx, cy, 5, 0, Math.PI*2);
    ctx.fillStyle = secColor;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx, cy, 2.5, 0, Math.PI*2);
    ctx.fillStyle = '#080e1a';
    ctx.fill();
  }

  // Init
  window.addEventListener('resize', () => { if (currentView === 'analog') { resizeCanvas(); drawAnalog(elapsed); } });
  resizeCanvas();
  renderHistory(0);
  renderHistory(1);
  drawAnalog(0);
</script>
